<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人才测评 — 在线考试系统</title>
<style>
/* ============ 全局 ============ */
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary: #4f46e5; --primary-light: #eef2ff; --success: #059669;
  --warning: #d97706; --danger: #dc2626; --gray-50: #f9fafb;
  --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
  --gray-500: #6b7280; --gray-700: #374151; --gray-900: #111827;
  --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,.1);
}
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--gray-100); color:var(--gray-900); line-height:1.6; }

/* ============ 顶部工具栏 ============ */
.header {
  position:sticky; top:0; z-index:100;
  background:#fff; border-bottom:1px solid var(--gray-200); padding:10px 24px;
  display:flex; align-items:center; gap:20px; box-shadow:var(--shadow);
}
.header h1 { font-size:18px; white-space:nowrap; }
.header .timer {
  font-size:24px; font-weight:700; font-variant-numeric:tabular-nums;
  color:var(--primary); min-width:80px; text-align:center;
}
.header .timer.warning { color:var(--warning); }
.header .timer.danger { color:var(--danger); animation:blink 1s infinite; }
@keyframes blink { 50%{opacity:.3;} }
.progress-bar {
  flex:1; height:8px; background:var(--gray-200); border-radius:4px; overflow:hidden;
}
.progress-bar .fill { height:100%; background:var(--primary); transition:width .3s; border-radius:4px; }
.progress-text { font-size:13px; color:var(--gray-500); white-space:nowrap; }
.btn {
  padding:8px 20px; border:none; border-radius:var(--radius); font-size:14px;
  cursor:pointer; font-weight:600; transition:all .2s;
}
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { filter:brightness(1.1); }
.btn-outline { background:#fff; color:var(--primary); border:2px solid var(--primary); }
.btn-outline:hover { background:var(--primary-light); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { filter:brightness(1.1); }

/* ============ 主体布局 ============ */
.main { display:flex; min-height:calc(100vh - 60px); }
.sidebar {
  width:260px; min-width:260px; background:#fff; border-right:1px solid var(--gray-200);
  padding:16px; overflow-y:auto; max-height:calc(100vh - 60px); position:sticky; top:60px;
}
.content { flex:1; padding:24px 32px; max-width:900px; overflow-y:auto; }

/* ============ 侧边栏导航 ============ */
.nav-group { margin-bottom:16px; }
.nav-group-title {
  font-size:13px; font-weight:700; color:var(--gray-700); padding:6px 8px;
  cursor:pointer; display:flex; justify-content:space-between; align-items:center;
  border-radius:4px; user-select:none;
}
.nav-group-title:hover { background:var(--gray-50); }
.nav-group-title .arrow { transition:transform .2s; font-size:10px; }
.nav-group-title.collapsed .arrow { transform:rotate(-90deg); }
.nav-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; padding:8px 0; }
.nav-grid.collapsed { display:none; }
.nav-btn {
  width:100%; aspect-ratio:1; border:1px solid var(--gray-200); border-radius:4px;
  font-size:12px; font-weight:600; cursor:pointer; background:#fff; transition:all .15s;
  display:flex; align-items:center; justify-content:center;
}
.nav-btn:hover { border-color:var(--primary); color:var(--primary); }
.nav-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.nav-btn.answered { background:var(--primary-light); border-color:var(--primary); color:var(--primary); }
.nav-btn.answered.active { background:var(--primary); color:#fff; }

/* ============ 题目卡片 ============ */
.question-card {
  background:#fff; border-radius:var(--radius); padding:32px;
  box-shadow:var(--shadow); margin-bottom:24px;
}
.question-type-badge {
  display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px;
  font-weight:700; margin-bottom:16px;
}
.badge-choice { background:#dbeafe; color:#1e40af; }
.badge-term { background:#dcfce7; color:#166534; }
.badge-short { background:#fef3c7; color:#92400e; }
.badge-essay { background:#fce7f3; color:#9d174d; }
.question-num { font-size:13px; color:var(--gray-500); margin-bottom:8px; }
.question-title { font-size:17px; font-weight:600; margin-bottom:24px; line-height:1.7; }

/* 选择题选项 */
.options { display:flex; flex-direction:column; gap:10px; }
.option {
  display:flex; align-items:flex-start; gap:12px; padding:12px 16px;
  border:2px solid var(--gray-200); border-radius:var(--radius); cursor:pointer;
  transition:all .15s; font-size:15px; line-height:1.5;
}
.option:hover { border-color:var(--primary); background:var(--primary-light); }
.option.selected { border-color:var(--primary); background:var(--primary-light); }
.option.correct { border-color:var(--success); background:#ecfdf5; }
.option.wrong { border-color:var(--danger); background:#fef2f2; }
.option-radio {
  width:22px; height:22px; min-width:22px; border-radius:50%; border:2px solid var(--gray-300);
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.option.selected .option-radio { border-color:var(--primary); background:var(--primary); }
.option.selected .option-radio::after { content:''; width:8px; height:8px; border-radius:50%; background:#fff; }
.option.correct .option-radio { border-color:var(--success); background:var(--success); }
.option.correct .option-radio::after { content:'✓'; color:#fff; font-size:12px; font-weight:700; }
.option.wrong .option-radio { border-color:var(--danger); background:var(--danger); }
.option.wrong .option-radio::after { content:'✕'; color:#fff; font-size:11px; font-weight:700; }

/* 文本输入 */
.text-answer { width:100%; min-height:200px; padding:16px; border:2px solid var(--gray-200);
  border-radius:var(--radius); font-size:15px; line-height:1.8; resize:vertical;
  font-family:inherit; transition:border-color .2s; }
.text-answer:focus { outline:none; border-color:var(--primary); }
.text-answer.large { min-height:400px; }

/* 导航按钮 */
.nav-buttons { display:flex; justify-content:space-between; margin-top:24px; gap:12px; }

/* 解析/参考答案区域 */
.explanation {
  margin-top:20px; padding:20px; background:var(--gray-50); border-radius:var(--radius);
  border-left:4px solid var(--primary); display:none;
}
.explanation.show { display:block; }
.explanation h4 { color:var(--primary); margin-bottom:8px; font-size:15px; }
.explanation p, .explanation li { font-size:14px; color:var(--gray-700); line-height:1.7; }
.explanation ul { padding-left:20px; }
.explanation table { width:100%; border-collapse:collapse; margin:8px 0; font-size:14px; }
.explanation th, .explanation td { border:1px solid var(--gray-200); padding:6px 10px; text-align:left; }
.explanation th { background:var(--gray-100); }

/* ============ 结果页 ============ */
.result-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200;
  display:none; align-items:flex-start; justify-content:center; padding-top:40px;
  overflow-y:auto;
}
.result-overlay.show { display:flex; }
.result-card {
  background:#fff; border-radius:12px; padding:40px; max-width:800px; width:90%;
  margin-bottom:40px; box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.result-card h2 { text-align:center; margin-bottom:8px; font-size:24px; }
.result-score {
  text-align:center; font-size:64px; font-weight:800; color:var(--primary); margin:16px 0;
}
.result-score.perfect { color:var(--success); }
.result-score.good { color:var(--primary); }
.result-score.ok { color:var(--warning); }
.result-score.low { color:var(--danger); }
.result-detail { margin:24px 0; }
.result-detail table { width:100%; border-collapse:collapse; }
.result-detail th, .result-detail td {
  border:1px solid var(--gray-200); padding:10px 14px; text-align:center; font-size:14px;
}
.result-detail th { background:var(--gray-50); font-weight:600; }
.result-review { margin-top:16px; }
.review-item {
  margin-bottom:12px; padding:14px; background:var(--gray-50); border-radius:var(--radius);
  border-left:4px solid var(--danger);
}
.review-item.correct-review { border-left-color:var(--success); }
.review-item h4 { font-size:15px; margin-bottom:6px; }
.review-item p { font-size:13px; color:var(--gray-500); }
.result-actions { display:flex; gap:12px; justify-content:center; margin-top:24px; }

/* 快捷键提示 */
.shortcut-hint {
  font-size:12px; color:var(--gray-500); text-align:center; padding:12px;
}

/* 确认弹窗 */
.confirm-dialog {
  position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:300;
  display:none; align-items:center; justify-content:center;
}
.confirm-dialog.show { display:flex; }
.confirm-box {
  background:#fff; border-radius:12px; padding:32px; max-width:440px; width:90%; text-align:center;
}
.confirm-box h3 { margin-bottom:12px; }
.confirm-box p { color:var(--gray-500); font-size:14px; margin-bottom:20px; }
.confirm-box .actions { display:flex; gap:12px; justify-content:center; }

/* ============ 错题本 ============ */
.wrongbook-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:250;
  display:none; align-items:flex-start; justify-content:center; padding-top:24px;
  overflow-y:auto;
}
.wrongbook-overlay.show { display:flex; }
.wrongbook-card {
  background:#fff; border-radius:12px; padding:32px; max-width:800px; width:90%;
  margin-bottom:40px; box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.wrongbook-card h2 { margin-bottom:4px; }
.wrongbook-stats { display:flex; gap:16px; align-items:center; margin:12px 0; flex-wrap:wrap; }
.wrongbook-stats .stat { font-size:13px; color:var(--gray-500); }
.wrongbook-stats .stat b { color:var(--danger); }
.filter-chips { display:flex; gap:6px; flex-wrap:wrap; margin:8px 0 16px; }
.filter-chip {
  padding:4px 12px; border-radius:20px; font-size:12px; cursor:pointer;
  border:1px solid var(--gray-200); background:#fff; transition:all .15s;
}
.filter-chip:hover { border-color:var(--primary); }
.filter-chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.wrongbook-item {
  margin-bottom:12px; padding:14px; background:var(--gray-50); border-radius:var(--radius);
  border-left:4px solid var(--danger);
}
.wrongbook-item h4 { font-size:15px; margin-bottom:4px; }
.wrongbook-item .q-text { font-size:14px; color:var(--gray-700); margin-bottom:8px; }
.wrongbook-item .ans-row { font-size:13px; }
.wrongbook-item .ans-row .wrong { color:var(--danger); font-weight:600; }
.wrongbook-item .ans-row .correct { color:var(--success); font-weight:600; }
.wrongbook-item .item-meta { font-size:11px; color:var(--gray-500); margin-top:6px; }
.wrongbook-empty { text-align:center; padding:60px 20px; color:var(--gray-500); }
.wrongbook-empty .icon { font-size:64px; margin-bottom:16px; }
.wrongbook-empty p { font-size:16px; }

/* ============ 题型选择弹窗 ============ */
.type-select-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:300;
  display:flex; align-items:center; justify-content:center;
}
.type-select-overlay.hidden { display:none; }
.type-select-card {
  background:#fff; border-radius:12px; padding:32px; max-width:440px; width:90%;
}
.type-select-card h3 { margin-bottom:8px; }
.type-select-card .subtitle { font-size:13px; color:var(--gray-500); margin-bottom:20px; }
.type-option {
  display:flex; align-items:center; gap:14px; padding:14px 16px;
  border:2px solid var(--gray-200); border-radius:var(--radius); margin-bottom:10px;
  cursor:pointer; transition:all .15s;
}
.type-option:hover { border-color:var(--primary); background:var(--primary-light); }
.type-option.selected { border-color:var(--primary); background:var(--primary-light); }
.type-option .type-icon { font-size:24px; }
.type-option .type-info { flex:1; }
.type-option .type-info .name { font-size:15px; font-weight:600; }
.type-option .type-info .desc { font-size:12px; color:var(--gray-500); }
.type-checkbox {
  width:24px; height:24px; min-width:24px; border-radius:6px; border:2px solid var(--gray-300);
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.type-option.selected .type-checkbox { background:var(--primary); border-color:var(--primary); }
.type-option.selected .type-checkbox::after { content:'✓'; color:#fff; font-size:14px; font-weight:700; }
.type-select-actions { display:flex; gap:10px; margin-top:16px; }
.type-select-actions .btn { flex:1; }
.type-select-warning { font-size:12px; color:var(--warning); margin-top:10px; text-align:center; }

/* ============ 起始页 ============ */
.home-screen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding:24px;
}
.home-screen.hidden { display:none; }
.home-card {
  background:#fff; border-radius:16px; padding:48px 40px; max-width:520px; width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.25); text-align:center;
}
.home-card .logo { font-size:56px; margin-bottom:12px; }
.home-card h1 { font-size:26px; margin-bottom:4px; }
.home-card .subtitle { font-size:14px; color:var(--gray-500); margin-bottom:28px; }

/* 统计卡片 */
.home-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
.home-stat {
  background:var(--gray-50); border-radius:10px; padding:14px 8px;
  text-align:center;
}
.home-stat .num { font-size:28px; font-weight:800; color:var(--primary); }
.home-stat .label { font-size:11px; color:var(--gray-500); margin-top:2px; }

/* 起始页题型选择 */
.home-types { text-align:left; margin-bottom:24px; }
.home-types .section-label { font-size:13px; font-weight:700; color:var(--gray-700); margin-bottom:10px; }
.home-type-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.home-type-chip {
  display:flex; align-items:center; gap:8px; padding:10px 14px;
  border:2px solid var(--gray-200); border-radius:10px; cursor:pointer;
  transition:all .15s; font-size:14px;
}
.home-type-chip:hover { border-color:var(--primary); }
.home-type-chip.selected { border-color:var(--primary); background:var(--primary-light); }
.home-type-chip .chip-check {
  width:20px; height:20px; min-width:20px; border-radius:5px; border:2px solid var(--gray-300);
  display:flex; align-items:center; justify-content:center; font-size:11px; color:transparent;
  transition:all .15s;
}
.home-type-chip.selected .chip-check { background:var(--primary); border-color:var(--primary); color:#fff; }
.home-type-chip .chip-num { font-size:11px; color:var(--gray-500); margin-left:auto; }

/* 起始页按钮 */
.home-actions { display:flex; gap:10px; flex-direction:column; }
.btn-start {
  padding:14px 32px; border:none; border-radius:12px; font-size:18px; font-weight:700;
  cursor:pointer; background:linear-gradient(135deg, #667eea, #764ba2);
  color:#fff; transition:all .2s; width:100%;
}
.btn-start:hover { transform:translateY(-1px); box-shadow:0 8px 25px rgba(102,126,234,.4); }
.home-actions .secondary-row { display:flex; gap:10px; }
.home-actions .secondary-row .btn { flex:1; font-size:13px; }
.home-footer { margin-top:20px; font-size:12px; color:var(--gray-500); }

/* 考试容器 */
#examContainer { display:none; }
#examContainer.show { display:block; }

/* 打印 */
@media print {
  .header, .sidebar, .nav-buttons, .shortcut-hint, .btn { display:none !important; }
  .main { display:block; }
  .content { max-width:100%; padding:0; }
  .question-card { box-shadow:none; break-inside:avoid; padding:16px; }
  .explanation { display:block !important; }
  .option { pointer-events:none; }
  .option.correct { border-color:var(--success); }
  body { font-size:12px; }
}

/* 响应式 */
@media (max-width:768px) {
  .sidebar { display:none; }
  .content { padding:16px; }
  .header { padding:8px 12px; gap:10px; }
  .header h1 { font-size:14px; }
  .header .timer { font-size:18px; }
  .question-card { padding:20px; }
}
</style>
</head>
<body>

<!-- ====== 起始页 ====== -->
<div class="home-screen" id="homeScreen">
  <div class="home-card">
    <div class="logo">📋</div>
    <h1>人才测评在线考试</h1>
    <p class="subtitle">课程自测练习系统 · 考点全覆盖</p>
    <div class="home-stats" id="homeStats"></div>
    <div class="home-types">
      <div class="section-label">选择练习题型</div>
      <div class="home-type-row" id="homeTypeRow"></div>
    </div>
    <div class="home-actions">
      <button class="btn-start" onclick="startExam()">▶️ 开始答题</button>
      <div class="secondary-row">
        <button class="btn btn-outline" onclick="showWrongBook()">📒 错题本 <small id="homeWrongCount">0</small></button>
        <button class="btn btn-outline" id="btnResume" style="display:none" onclick="startExam()">📌 继续上次</button>
      </div>
    </div>
    <p class="home-footer">⌨️ 答题快捷键：← → 翻题 ｜ 选择题按 1-4 选选项</p>
  </div>
</div>

<!-- ====== 考试界面容器 ====== -->
<div id="examContainer">

<!-- 顶部工具栏 -->
<header class="header">
  <h1>📋 人才测评考试</h1>
  <div class="timer" id="timer">00:00</div>
  <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
  <span class="progress-text" id="progressText">0/43</span>
  <button class="btn btn-outline" onclick="showWrongBook()">📒 错题本 <small id="wrongCount">0</small></button>
  <button class="btn btn-outline" onclick="showTypeSelect()">⚙️ 题型</button>
  <button class="btn btn-outline" onclick="resetExam()">🔄 重置</button>
  <button class="btn btn-primary" onclick="showConfirm()">📝 提交</button>
</header>

<!-- 主体 -->
<div class="main">
  <!-- 侧边栏 -->
  <nav class="sidebar" id="sidebar">
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        单选题 <small>(20题)</small> <span class="arrow">▼</span>
      </div>
      <div class="nav-grid" id="navChoice"></div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        名词解释 <small>(10题)</small> <span class="arrow">▼</span>
      </div>
      <div class="nav-grid" id="navTerm"></div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        简答题 <small>(10题)</small> <span class="arrow">▼</span>
      </div>
      <div class="nav-grid" id="navShort"></div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        论述/模拟题 <small>(3题)</small> <span class="arrow">▼</span>
      </div>
      <div class="nav-grid" id="navEssay"></div>
    </div>
  </nav>

  <!-- 答题区 -->
  <main class="content" id="questionArea"></main>
</div>

<!-- 提交确认弹窗 -->
<div class="confirm-dialog" id="confirmDialog">
  <div class="confirm-box">
    <h3>确认提交？</h3>
    <p id="confirmMsg">提交后不可修改，确定要提交吗？</p>
    <div class="actions">
      <button class="btn btn-outline" onclick="hideConfirm()">继续答题</button>
      <button class="btn btn-danger" onclick="submitExam()">确认提交</button>
    </div>
  </div>
</div>

<!-- 错题本弹窗 -->
<div class="wrongbook-overlay" id="wrongbookOverlay">
  <div class="wrongbook-card" id="wrongbookCard"></div>
</div>

<!-- 题型选择弹窗 -->
<div class="type-select-overlay hidden" id="typeSelectOverlay">
  <div class="type-select-card">
    <h3>⚙️ 选择练习题型</h3>
    <p class="subtitle">勾选你想要练习的题型，未选中的题型将被跳过</p>
    <div id="typeOptions"></div>
    <div class="type-select-actions">
      <button class="btn btn-outline" onclick="toggleAllTypes()" id="btnToggleAll">全不选</button>
      <button class="btn btn-primary" onclick="applyTypeSelection()">✅ 确认</button>
    </div>
    <p class="type-select-warning" id="typeWarning" style="display:none">⚠ 修改题型选择将重置当前答题进度</p>
  </div>
</div>

<!-- 结果弹窗 -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card" id="resultCard"></div>
</div>

</div><!-- #examContainer -->

<script>
// ==================== 题目数据 ====================
const choiceQuestions = [
     {
      "id": 1,
      "topic": "三大核心假设",
      "q": "人才测评之所以能够存在并发挥作用，其根本前提是：",
      "opts": [
       "A. 岗位需求可以被精准量化",

// ==================== 状态管理 ====================
let TOTAL = 43;
let currentIndex = 0;
let answers = {};        // {id: value}  — 选择题为选项索引(0-3)，文本题为字符串
let startTime = Date.now();
let timerInterval;
let submitted = false;

// 题型选择
let selectedTypes = loadTypeSelection();

function loadTypeSelection() {
  try {
    const d = JSON.parse(localStorage.getItem('rcTypeSelection'));
    if (d) return d;
  } catch(e){}
  return {choice:true, term:true, short:true, essay:true};
}
function saveTypeSelection() {
  try { localStorage.setItem('rcTypeSelection', JSON.stringify(selectedTypes)); } catch(e){}
}

// 加载/保存
function loadState() {
  try {
    const d = JSON.parse(localStorage.getItem('rcExamState'));
    if (d && d.answers) { answers = d.answers; currentIndex = d.currentIndex||0; startTime = d.startTime||Date.now(); return true; }
  } catch(e){}
  return false;
}
let saved = loadState();
function saveState() {
  try { localStorage.setItem('rcExamState', JSON.stringify({answers,currentIndex,startTime})); } catch(e){}
}

// ==================== 获取活跃题目 ====================
function getActiveQuestions() {
  const arr = [];
  if (selectedTypes.choice) choiceQuestions.forEach(q=>arr.push({...q,type:'choice'}));
  if (selectedTypes.term) termQuestions.forEach(q=>arr.push({...q,type:'term'}));
  if (selectedTypes.short) shortQuestions.forEach(q=>arr.push({...q,type:'short'}));
  if (selectedTypes.essay) essayQuestions.forEach(q=>arr.push({...q,type:'essay'}));
  return arr;
}
let allQuestions = getActiveQuestions();
function refreshQuestions() {
  allQuestions = getActiveQuestions();
  TOTAL = allQuestions.length;
}

// ==================== 渲染导航 ====================
function buildNav() {
  let offset = 0;
  buildNavGroupExt('navChoice', choiceQuestions, offset, selectedTypes.choice); offset+=selectedTypes.choice?20:0;
  buildNavGroupExt('navTerm', termQuestions, offset, selectedTypes.term); offset+=selectedTypes.term?10:0;
  buildNavGroupExt('navShort', shortQuestions, offset, selectedTypes.short); offset+=selectedTypes.short?10:0;
  buildNavGroupExt('navEssay', essayQuestions, offset, selectedTypes.essay);
}
function buildNavGroupExt(containerId, questions, offset, visible) {
  const c = document.getElementById(containerId);
  const parent = c.parentElement;
  if (!visible) { parent.style.display='none'; return; }
  parent.style.display='';
  c.innerHTML = questions.map((q,i)=>{
    const gid = offset+i;
    const cls = gid===currentIndex?'active':(answers[q.id]!==undefined?'answered':'');
    return `<button class="nav-btn ${cls}" onclick="goTo(${gid})">${i+1}</button>`;
  }).join('');
}
function updateNavActive() {
  document.querySelectorAll('.nav-btn').forEach((btn,i)=>{
    btn.classList.remove('active');
    if (i===currentIndex) btn.classList.add('active');
  });
}

// ==================== 渲染题目 ====================
function renderQuestion() {
  if (submitted) return;
  const q = allQuestions[currentIndex];
  const area = document.getElementById('questionArea');
  updateNavActive();
  updateProgress();

  const typeLabels = {choice:['单选题','badge-choice'],term:['名词解释','badge-term'],short:['简答题','badge-short'],essay:['论述/模拟题','badge-essay']};
  const [label,badgeCls] = typeLabels[q.type];

  let bodyHTML = '';
  if (q.type === 'choice') {
    const selected = answers[q.id];
    bodyHTML = `<div class="options">${q.opts.map((opt,i)=>{
      const cls = selected===i?'selected':'';
      return `<div class="option ${cls}" onclick="selectChoice(${i})">
        <div class="option-radio"></div><span>${opt}</span></div>`;
    }).join('')}</div>`;
  } else {
    const cls = q.type==='essay'?'text-answer large':'text-answer';
    const val = answers[q.id] || '';
    bodyHTML = `<textarea class="${cls}" id="textInput" placeholder="请在此输入你的答案..." oninput="onTextInput(this.value)">${val}</textarea>`;
  }

  area.innerHTML = `
    <div class="question-card">
      <span class="question-type-badge ${badgeCls}">${label}</span>
      <div class="question-num">第 ${currentIndex+1} 题 / 共 ${TOTAL} 题　|　${q.topic||''}</div>
      <div class="question-title">${q.q}</div>
      ${bodyHTML}
      <div class="nav-buttons">
        <button class="btn btn-outline" ${currentIndex===0?'disabled':''} onclick="goTo(${currentIndex-1})">← 上一题</button>
        <span style="color:var(--gray-500);font-size:13px;line-height:36px;">键盘 ← → 翻题　选择题 1-4 选选项</span>
        <button class="btn btn-outline" ${currentIndex===TOTAL-1?'disabled':''} onclick="goTo(${currentIndex+1})">下一题 →</button>
      </div>
    </div>`;

  // 滚动到顶部
  area.scrollIntoView({behavior:'smooth',block:'start'});
  saveState();
}

// ==================== 交互处理 ====================
function selectChoice(index) {
  if (submitted) return;
  const q = allQuestions[currentIndex];
  answers[q.id] = index;
  renderQuestion();
  buildNav();
  saveState();
}
function onTextInput(val) {
  if (submitted) return;
  const q = allQuestions[currentIndex];
  if (val.trim()) answers[q.id] = val; else delete answers[q.id];
  buildNav();
  saveState();
}
function goTo(index) {
  if (index<0||index>=TOTAL) return;
  currentIndex = index;
  renderQuestion();
  saveState();
}

// ==================== 进度 & 计时 ====================
function updateProgress() {
  const answered = Object.keys(answers).length;
  document.getElementById('progressFill').style.width = (answered/TOTAL*100)+'%';
  document.getElementById('progressText').textContent = `${answered}/${TOTAL}`;
}
function updateTimer() {
  const elapsed = Math.floor((Date.now()-startTime)/1000);
  const m = Math.floor(elapsed/60), s = elapsed%60;
  const el = document.getElementById('timer');
  el.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  el.classList.toggle('warning', elapsed>1800);
  el.classList.toggle('danger', elapsed>3600);
}

// ==================== 提交确认 ====================
function showConfirm() {
  if (submitted) return;
  const unanswered = TOTAL - Object.keys(answers).length;
  const uList = [];
  for (let i=0;i<TOTAL;i++) {
    const q = allQuestions[i];
    if (answers[q.id]===undefined) uList.push(`第${i+1}题`);
  }
  let msg = unanswered>0
    ? `还有 <b>${unanswered}</b> 道题未作答：${uList.slice(0,5).join('、')}${uList.length>5?'...':''}<br>未答题目将计0分。确定提交吗？`
    : '全部题目已作答，确定提交吗？';
  document.getElementById('confirmMsg').innerHTML = msg;
  document.getElementById('confirmDialog').classList.add('show');
}
function hideConfirm() { document.getElementById('confirmDialog').classList.remove('show'); }

// ==================== 提交评分 ====================
function submitExam() {
  hideConfirm();
  submitted = true;
  clearInterval(timerInterval);
  const elapsed = Math.floor((Date.now()-startTime)/1000);

  // 选择题判分
  let choiceCorrect = 0;
  const reviewItems = [];
  const wrongItems = [];
  choiceQuestions.forEach((q,i)=>{
    if (!selectedTypes.choice) return;
    const userAns = answers[q.id];
    const correct = userAns===q.ans;
    if (correct) choiceCorrect++;
    const item = {
      num:allQuestions.findIndex(x=>x.id===q.id)+1,type:'choice',topic:q.topic,q:q.q,
      userAns:userAns!==undefined?q.opts[userAns]:'未作答',
      correctAns:q.opts[q.ans],
      isCorrect:correct,exp:q.exp
    };
    reviewItems.push(item);
    if (!correct) wrongItems.push({id:q.id, topic:q.topic, type:'choice', q:q.q, userAns:item.userAns, correctAns:item.correctAns, exp:q.exp});
  });

  const totalChoice = selectedTypes.choice ? 20 : 0;

  // 文本题：不自动评分，只对照
  const textReview = [];
  const textSources = [];
  if (selectedTypes.term) textSources.push(...termQuestions);
  if (selectedTypes.short) textSources.push(...shortQuestions);
  if (selectedTypes.essay) textSources.push(...essayQuestions);

  textSources.forEach(q=>{
    const gid = allQuestions.findIndex(x=>x.id===q.id);
    textReview.push({
      num:gid+1,type:q.type||(q.ref.includes('定义')?'term':'short'),
      topic:q.topic,q:q.q,
      userAns:answers[q.id]||'（未作答）',
      ref:q.ref
    });
  });

  // Auto-save wrong answers to wrong book
  if (wrongItems.length > 0) saveWrongBook(wrongItems);

  // 渲染结果
  const ratio = totalChoice>0 ? choiceCorrect/totalChoice : 1;
  let scoreClass='low', comment='继续加油，多复习重点回顾！';
  if (ratio>=0.9) { scoreClass='perfect'; comment='非常优秀！你对人才测评知识掌握得很扎实！'; }
  else if (ratio>=0.7) { scoreClass='good'; comment='表现不错！再巩固一下薄弱知识点即可。'; }
  else if (ratio>=0.5) { scoreClass='ok'; comment='还需加强复习，重点关注错题涉及的知识点。'; }

  const m = Math.floor(elapsed/60), s = elapsed%60;

  // Build dynamic stats table
  let statsRows = '';
  if (selectedTypes.choice) statsRows += `<tr><td>单选题</td><td>20题</td><td><b>${choiceCorrect}分</b></td><td>自动判分</td></tr>`;
  if (selectedTypes.term) statsRows += `<tr><td>名词解释</td><td>10题</td><td>-</td><td>请自行对照参考答案评估</td></tr>`;
  if (selectedTypes.short) statsRows += `<tr><td>简答题</td><td>10题</td><td>-</td><td>请自行对照参考答案评估</td></tr>`;
  if (selectedTypes.essay) statsRows += `<tr><td>论述/模拟题</td><td>3题</td><td>-</td><td>请自行对照参考答案评估</td></tr>`;

  let scoreSection = '';
  if (selectedTypes.choice) {
    scoreSection = `
    <div class="result-score ${scoreClass}">${choiceCorrect}/${totalChoice}</div>
    <p style="text-align:center;color:var(--gray-500);">选择题得分 · 用时 ${m}分${s}秒</p>
    <p style="text-align:center;font-size:16px;margin-top:8px;">${comment}</p>`;
  } else {
    scoreSection = `
    <div style="text-align:center;padding:20px;color:var(--gray-500);">📝 本次练习未包含选择题<br>请自行对照参考答案评估文本题</div>`;
  }

  // Build review sections (only for selected types)
  let choiceReviewHTML = '';
  if (selectedTypes.choice) {
    choiceReviewHTML = `
    <h3 style="margin-top:24px;">📝 选择题逐题回顾</h3>
    <div class="result-review">
      ${reviewItems.map(r=>`
        <div class="review-item ${r.isCorrect?'correct-review':''}">
          <h4>${r.isCorrect?'✅':'❌'} 第${r.num}题（${r.topic}）</h4>
          <p><b>题目：</b>${r.q}</p>
          <p><b>你的答案：</b>${r.userAns}　<b>正确答案：</b>${r.correctAns}</p>
          ${r.isCorrect?'<p style="color:var(--success)">回答正确 ✓</p>':`<p style="color:var(--danger)"><b>解析：</b>${r.exp}</p>`}
        </div>
      `).join('')}
    </div>`;
  }

  let termReviewHTML = '';
  if (selectedTypes.term) {
    const items = textReview.filter(r=>r.type==='term');
    if (items.length>0) {
      termReviewHTML = `
      <h3 style="margin-top:24px;">📖 名词解释 · 参考答案</h3>
      <div class="result-review">
        ${items.map(r=>`
          <div class="review-item correct-review">
            <h4>第${r.num}题（${r.topic}）</h4>
            <p><b>你的答案：</b>${r.userAns.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>
            <details style="margin-top:8px;"><summary style="cursor:pointer;color:var(--primary);font-weight:600;">查看参考答案</summary>
            <div style="margin-top:8px;">${r.ref}</div></details>
          </div>
        `).join('')}
      </div>`;
    }
  }

  let shortReviewHTML = '';
  if (selectedTypes.short) {
    const items = textReview.filter(r=>r.type==='short');
    if (items.length>0) {
      shortReviewHTML = `
      <h3 style="margin-top:24px;">📖 简答题 · 参考答案</h3>
      <div class="result-review">
        ${items.map(r=>`
          <div class="review-item correct-review">
            <h4>第${r.num}题（${r.topic}）</h4>
            <p><b>你的答案：</b>${r.userAns.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>
            <details style="margin-top:8px;"><summary style="cursor:pointer;color:var(--primary);font-weight:600;">查看参考答案要点</summary>
            <div style="margin-top:8px;">${r.ref}</div></details>
          </div>
        `).join('')}
      </div>`;
    }
  }

  let essayReviewHTML = '';
  if (selectedTypes.essay) {
    const items = textReview.filter(r=>r.type==='essay');
    if (items.length>0) {
      essayReviewHTML = `
      <h3 style="margin-top:24px;">📖 论述/模拟题 · 参考答案</h3>
      <div class="result-review">
        ${items.map(r=>`
          <div class="review-item correct-review">
            <h4>第${r.num}题（${r.topic}）</h4>
            <p><b>你的答案：</b>${(r.userAns||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>
            <details style="margin-top:8px;"><summary style="cursor:pointer;color:var(--primary);font-weight:600;">查看参考答案</summary>
            <div style="margin-top:8px;">${r.ref}</div></details>
          </div>
        `).join('')}
      </div>`;
    }
  }

  document.getElementById('resultCard').innerHTML = `
    <h2>📊 考试成绩单</h2>
    ${scoreSection}
    <div class="result-detail">
      <table>
        <tr><th>题型</th><th>题数</th><th>得分</th><th>说明</th></tr>
        ${statsRows}
      </table>
    </div>
    ${choiceReviewHTML}
    ${termReviewHTML}
    ${shortReviewHTML}
    ${essayReviewHTML}
    <div class="result-actions">
      <button class="btn btn-outline" onclick="window.print()">🖨️ 打印成绩单</button>
      <button class="btn btn-outline" onclick="showWrongBook()">📒 查看错题本</button>
      <button class="btn btn-primary" onclick="resetExam()">🔄 重新答题</button>
      <button class="btn btn-outline" onclick="goHome()">🏠 返回首页</button>
    </div>
  `;
  document.getElementById('resultOverlay').classList.add('show');
  document.getElementById('resultOverlay').scrollIntoView({behavior:'smooth'});
}

// ==================== 重置 ====================
function resetExam() {
  if (submitted && !confirm('确定要重新开始吗？当前答案将被清除。')) return;
  if (!submitted && Object.keys(answers).length>0 && !confirm('确定要重置吗？当前所有答案将被清除。')) return;
  goHome();
}

// ==================== 错题本 ====================
function loadWrongBook() {
  try { return JSON.parse(localStorage.getItem('rcWrongBook')) || []; }
  catch(e){ return []; }
}
function saveWrongBook(items) {
  const existing = loadWrongBook();
  const map = new Map(existing.map(w=>[w.id, w]));
  items.forEach(item => { map.set(item.id, {...item, time: new Date().toLocaleString()}); });
  const merged = Array.from(map.values());
  try { localStorage.setItem('rcWrongBook', JSON.stringify(merged)); } catch(e){}
  updateWrongCount();
  if (document.getElementById('wrongbookOverlay').classList.contains('show')) renderWrongBook();
}
function clearWrongBook() {
  if (!confirm('确定要清空整个错题本吗？此操作不可恢复。')) return;
  try { localStorage.removeItem('rcWrongBook'); } catch(e){}
  updateWrongCount();
  renderWrongBook();
}
function showWrongBook() {
  renderWrongBook();
  document.getElementById('wrongbookOverlay').classList.add('show');
}
function hideWrongBook() {
  document.getElementById('wrongbookOverlay').classList.remove('show');
}
function updateWrongCount() {
  const count = loadWrongBook().length;
  const el = document.getElementById('wrongCount');
  if (el) el.textContent = count;
}
function renderWrongBook(filterTopic) {
  const wrongItems = loadWrongBook();
  // Get unique topics
  const topics = [...new Set(wrongItems.map(w=>w.topic))];
  const filtered = filterTopic ? wrongItems.filter(w=>w.topic===filterTopic) : wrongItems;

  const typeLabels = {choice:['单选题','badge-choice'],term:['名词解释','badge-term'],short:['简答题','badge-short'],essay:['论述/模拟题','badge-essay']};

  if (wrongItems.length===0) {
    document.getElementById('wrongbookCard').innerHTML = `
      <h2>📒 错题本</h2>
      <div class="wrongbook-empty">
        <div class="icon">🎉</div>
        <p>暂无错题，继续加油！</p>
        <p style="font-size:13px;margin-top:8px;">提交考试后，错题会自动收录到这里</p>
      </div>
      <div style="text-align:center;margin-top:20px;"><button class="btn btn-outline" onclick="hideWrongBook()">关闭</button></div>`;
    return;
  }

  document.getElementById('wrongbookCard').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <h2>📒 错题本</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline" style="font-size:12px;padding:6px 14px;" onclick="clearWrongBook()">🗑️ 清空</button>
        <button class="btn btn-outline" style="font-size:12px;padding:6px 14px;" onclick="hideWrongBook()">✕ 关闭</button>
      </div>
    </div>
    <div class="wrongbook-stats">
      <span class="stat">共 <b>${wrongItems.length}</b> 道错题</span>
      ${filterTopic?`<span class="stat">筛选: <b>${filterTopic}</b></span>`:''}
    </div>
    <div class="filter-chips">
      <span class="filter-chip ${!filterTopic?'active':''}" onclick="renderWrongBook(null)">全部</span>
      ${topics.map(t=>`<span class="filter-chip ${filterTopic===t?'active':''}" onclick="renderWrongBook('${t}')">${t}</span>`).join('')}
    </div>
    ${filtered.length===0?`<div class="wrongbook-empty"><p>该知识点下暂无错题 🎉</p></div>`:''}
    ${filtered.map(w=>{
      const [label,badgeCls] = typeLabels[w.type]||['未知',''];
      return `
      <div class="wrongbook-item">
        <h4><span class="question-type-badge ${badgeCls}" style="margin:0 8px 0 0;">${label}</span>${w.topic||''}</h4>
        <div class="q-text">${w.q.substring(0,120)}${w.q.length>120?'...':''}</div>
        ${w.userAns!==undefined?`<div class="ans-row">❌ 你的答案：<span class="wrong">${w.userAns||'未作答'}</span>　✅ 正确答案：<span class="correct">${w.correctAns||''}</span></div>`:''}
        ${w.exp?`<details style="margin-top:6px;"><summary style="cursor:pointer;color:var(--primary);font-size:13px;font-weight:600;">查看解析</summary><p style="margin-top:4px;font-size:13px;color:var(--gray-500);">${w.exp}</p></details>`:''}
        ${w.time?`<div class="item-meta">收录于 ${w.time}</div>`:''}
      </div>`;
    }).join('')}
    <div style="text-align:center;margin-top:16px;"><button class="btn btn-outline" onclick="hideWrongBook()">关闭</button></div>`;
}

// ==================== 题型选择 ====================
function showTypeSelect() {
  const overlay = document.getElementById('typeSelectOverlay');
  const warning = document.getElementById('typeWarning');
  const hasAnswers = Object.keys(answers).length > 0;
  warning.style.display = hasAnswers ? '' : 'none';
  renderTypeOptions();
  overlay.classList.remove('hidden');
}
function hideTypeSelect() {
  document.getElementById('typeSelectOverlay').classList.add('hidden');
}
function toggleAllTypes() {
  const allSelected = Object.values(selectedTypes).every(v=>v);
  const newVal = !allSelected;
  selectedTypes = {choice:newVal, term:newVal, short:newVal, essay:newVal};
  renderTypeOptions();
  renderHomeTypes();
}
function renderTypeOptions() {
  const types = [
    {key:'choice', name:'单选题', count:20, desc:'自动判分 · 限时练习', icon:'📝'},
    {key:'term', name:'名词解释', count:10, desc:'自评对照 · 核心概念', icon:'📖'},
    {key:'short', name:'简答题', count:10, desc:'自评对照 · 知识要点', icon:'✍️'},
    {key:'essay', name:'论述/模拟题', count:3, desc:'自评对照 · 综合应用', icon:'📋'}
  ];
  const allSelected = Object.values(selectedTypes).every(v=>v);
  document.getElementById('btnToggleAll').textContent = allSelected ? '取消全选' : '全选';
  document.getElementById('typeOptions').innerHTML = types.map(t=>`
    <div class="type-option ${selectedTypes[t.key]?'selected':''}" onclick="toggleType('${t.key}')">
      <span class="type-icon">${t.icon}</span>
      <div class="type-info">
        <div class="name">${t.name} <small style="color:var(--gray-500)">(${t.count}题)</small></div>
        <div class="desc">${t.desc}</div>
      </div>
      <div class="type-checkbox"></div>
    </div>
  `).join('');
}
function toggleType(key) {
  selectedTypes[key] = !selectedTypes[key];
  renderTypeOptions();
  renderHomeTypes();
}
function applyTypeSelection() {
  const count = Object.values(selectedTypes).filter(v=>v).length;
  if (count===0) { alert('请至少选择一种题型'); return; }
  const hasAnswers = Object.keys(answers).length > 0;
  if (hasAnswers && !confirm('修改题型选择将清除当前所有答题进度，确定继续吗？')) return;
  saveTypeSelection();
  // Reset all progress
  answers = {};
  currentIndex = 0;
  submitted = false;
  startTime = Date.now();
  refreshQuestions();
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('wrongbookOverlay').classList.remove('show');
  hideTypeSelect();
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
  updateTimer();
  updateWrongCount();
  buildNav();
  renderQuestion();
  saveState();
}

// ==================== 起始页 ====================
function renderHomeTypes() {
  const types = [
    {key:'choice', name:'单选题', count:20, icon:'📝'},
    {key:'term', name:'名词解释', count:10, icon:'📖'},
    {key:'short', name:'简答题', count:10, icon:'✍️'},
    {key:'essay', name:'论述/模拟', count:3, icon:'📋'}
  ];
  document.getElementById('homeTypeRow').innerHTML = types.map(t=>`
    <div class="home-type-chip ${selectedTypes[t.key]?'selected':''}" onclick="toggleHomeType('${t.key}')">
      <span class="chip-check">✓</span>
      <span>${t.icon} ${t.name}</span>
      <span class="chip-num">${t.count}题</span>
    </div>
  `).join('');
  // Update stats
  const totalSelected = (selectedTypes.choice?20:0)+(selectedTypes.term?10:0)+(selectedTypes.short?10:0)+(selectedTypes.essay?3:0);
  document.getElementById('homeStats').innerHTML = `
    <div class="home-stat"><div class="num">${totalSelected}</div><div class="label">总题量</div></div>
    <div class="home-stat"><div class="num">${selectedTypes.choice?20:0}</div><div class="label">选择题</div></div>
    <div class="home-stat"><div class="num">~${Math.round(totalSelected*1.5)}min</div><div class="label">预计用时</div></div>
  `;
  // Update resume button
  const hasProgress = loadState() && Object.keys(answers).length > 0;
  document.getElementById('btnResume').style.display = hasProgress ? '' : 'none';
}
function toggleHomeType(key) {
  selectedTypes[key] = !selectedTypes[key];
  saveTypeSelection();
  renderHomeTypes();
  renderTypeOptions();
}
function renderHomeScreen() {
  renderHomeTypes();
  updateWrongCount();
  document.getElementById('homeWrongCount').textContent = loadWrongBook().length;
}
function startExam() {
  const count = Object.values(selectedTypes).filter(v=>v).length;
  if (count===0) { alert('请至少选择一种题型'); return; }
  saveTypeSelection();
  refreshQuestions();
  if (TOTAL===0) { alert('当前选择的题型无题目'); return; }
  // Hide home, show exam
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('examContainer').classList.add('show');
  // Preserve saved startTime if resuming; otherwise start fresh
  if (!saved || Object.keys(answers).length===0) {
    startTime = Date.now();
  }
  timerInterval = setInterval(updateTimer, 1000);
  updateTimer();
  buildNav();
  renderQuestion();
  saveState();
}
function goHome() {
  submitted = false;
  answers = {};
  currentIndex = 0;
  clearInterval(timerInterval);
  document.getElementById('examContainer').classList.remove('show');
  document.getElementById('homeScreen').classList.remove('hidden');
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('wrongbookOverlay').classList.remove('show');
  saveState(); // 清除进度
  refreshQuestions();
  renderHomeScreen();
}

// ==================== 初始化按钮状态 ====================
function updateWrongCount() {
  const count = loadWrongBook().length;
  const el = document.getElementById('wrongCount');
  if (el) el.textContent = count;
}

// ==================== 导航折叠 ====================
function toggleGroup(el) {
  el.classList.toggle('collapsed');
  el.nextElementSibling.classList.toggle('collapsed');
}

// ==================== 键盘快捷键 ====================
document.addEventListener('keydown',(e)=>{
  if (submitted) return;
  if (TOTAL===0) return;
  if (e.target.tagName==='TEXTAREA') return; // 不在文本框中拦截
  if (e.key==='ArrowLeft') { e.preventDefault(); goTo(currentIndex-1); }
  if (e.key==='ArrowRight') { e.preventDefault(); goTo(currentIndex+1); }
  const q = allQuestions[currentIndex];
  if (q && q.type==='choice') {
    if (['1','2','3','4'].includes(e.key)) { e.preventDefault(); selectChoice(parseInt(e.key)-1); }
  }
});

// ==================== 初始化 ====================
function init() {
  renderHomeScreen();
  updateWrongCount();
}

init();
console.log('✅ 人才测评在线考试系统已就绪');
console.log('📋 快捷键：← → 翻题 | 1-4 选选项（选择题）');
console.log('💾 答题进度已保存到 localStorage，刷新不丢失');
</script>
